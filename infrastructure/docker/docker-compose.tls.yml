# infrastructure/docker/docker-compose.tls.yml
services:
  edge:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    networks:
      - rag-net

volumes:
  caddy_data:
  caddy_config:
