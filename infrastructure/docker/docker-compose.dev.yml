# infrastructure/docker/docker-compose.dev.yml
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass 1234
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    command: start-dev

  # ------------------------------------------------------------------
  # Apache AGE — dedicated graph DB, separate from the relational
  # ragdb Postgres above. Kept on its own port (5455) and its own
  # volume so it can be wiped/reseeded independently during ontology
  # iteration without touching relational app data.
  # ------------------------------------------------------------------
  age:
    image: apache/age:release_PG16_1.5.0
    environment:
      POSTGRES_DB: agedb
      POSTGRES_USER: ageuser
      POSTGRES_PASSWORD: agepassword
    ports:
      - "5455:5432"
    volumes:
      - age_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ageuser -d agedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------------------------------------------
  # GLiNER multilingual NER microservice — standalone FastAPI service,
  # shared by both ingestion-time and query-time NER calls. Built from
  # local source (services/ner/), not a public image.
  # ------------------------------------------------------------------
  ner:
    build:
      context: ../../services/ner
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      GLINER_MODEL_NAME: urchade/gliner_multi-v2.1
      GLINER_LANGUAGES: en,ar
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ner_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  age_data:
  ner_model_cache: