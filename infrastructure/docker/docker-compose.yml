services:

  # ── PostgreSQL + Apache AGE ─────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # ── Qdrant (vector DB) ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag-net

  # ── Redis (Celery broker + result backend) ──────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag-net

  # ── Ollama (bge-m3 embeddings + generation) ─────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-net
    # Pull bge-m3 on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull bge-m3:latest && wait"]

  # ── FastAPI backend ─────────────────────────────────────────────────
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OLLAMA_BASE_URL: http://ollama:11434
      MOCK_LLM_RESPONSES: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # ── Celery worker ───────────────────────────────────────────────────
  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
      REDIS_HOST: redis
      OLLAMA_BASE_URL: http://ollama:11434
      MOCK_LLM_RESPONSES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - rag-net

  # ── Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - rag-net

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  ollama_data:

networks:
  rag-net:
    driver: bridge