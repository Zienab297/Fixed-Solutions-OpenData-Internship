services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8000}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./local_data/rag.db}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-rag-realm}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-rag-backend}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://localhost:5173}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-https://your-colab-tunnel-url/v1}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-Qwen/Qwen3-8B}
      LOCAL_LLM_QUANTIZATION: ${LOCAL_LLM_QUANTIZATION:-4-bit}
      LOCAL_LLM_HOSTING: ${LOCAL_LLM_HOSTING:-google-colab}
      JUDGE_MODEL: ${JUDGE_MODEL:-Qwen/Qwen3-8B}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      API_LLM_PROVIDER: ${API_LLM_PROVIDER:-gemini}
      API_LLM_MODEL: ${API_LLM_MODEL:-gemini-3.5-flash}
      MOCK_LLM_RESPONSES: ${MOCK_LLM_RESPONSES:-true}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/local_data/uploads}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_chunks}
      INGESTION_CHUNK_SIZE: ${INGESTION_CHUNK_SIZE:-2000}
      INGESTION_CHUNK_OVERLAP: ${INGESTION_CHUNK_OVERLAP:-200}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/local_data
    depends_on:
      - redis
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - rag-net

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    command: celery -A app.ingestion.tasks.celery_app worker --loglevel=info
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./local_data/rag.db}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/local_data/uploads}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_chunks}
      INGESTION_CHUNK_SIZE: ${INGESTION_CHUNK_SIZE:-2000}
      INGESTION_CHUNK_OVERLAP: ${INGESTION_CHUNK_OVERLAP:-200}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
    volumes:
      - backend-data:/app/local_data
    depends_on:
      - redis
      - qdrant
      - api
    networks:
      - rag-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - rag-net

  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - rag-net

networks:
  rag-net:
    driver: bridge

volumes:
  backend-data:
  qdrant-data:
