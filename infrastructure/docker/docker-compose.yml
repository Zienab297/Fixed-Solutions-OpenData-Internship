services:

  # ── PostgreSQL + Apache AGE ─────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # ── Qdrant (vector DB) ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rag-net

  # ── Redis (Celery broker + result backend) ──────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag-net

  # ── Ollama (local generation) ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-net
    environment:
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.2:3b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3:latest}
    # Keep serving even if model pull fails; the API/worker will surface model errors.
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5; for model in \"$${LOCAL_LLM_MODEL:-llama3.2:3b}\" \"$${EMBEDDING_MODEL:-bge-m3:latest}\"; do ollama show \"$${model}\" >/dev/null 2>&1 || ollama pull \"$${model}\" || echo \"warning: failed to pull $${model}\"; done; wait"]

  # ── Ollama (dedicated judge LLM) ───────────────────────────────────
  judge-ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - judge_ollama_data:/root/.ollama
    networks:
      - rag-net
    environment:
      JUDGE_MODEL: ${JUDGE_MODEL:-llama3.2:3b}
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5; ollama show \"$${JUDGE_MODEL:-llama3.2:3b}\" >/dev/null 2>&1 || ollama pull \"$${JUDGE_MODEL:-llama3.2:3b}\" || echo \"warning: failed to pull $${JUDGE_MODEL:-llama3.2:3b}\"; wait"]

  # ── FastAPI backend ─────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@postgres:5432/ragdb
      CELERY_BROKER_URL: redis://:redispassword@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redispassword@redis:6379/1
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      DEV_MODE: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      LOCAL_LLM_BASE_URL: http://ollama:11434/v1
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.2:3b}
      JUDGE_LLM_BASE_URL: http://judge-ollama:11434
      JUDGE_MODEL: ${JUDGE_MODEL:-llama3.2:3b}
      JUDGE_ENABLED: "true"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3:latest}
      EMBEDDING_DIMENSION: 1024
      OCR_LANG: ${OCR_LANG:-ar}
      OCR_DEVICE: ${OCR_DEVICE:-gpu}
      MOCK_LLM_RESPONSES: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # ── Celery worker ───────────────────────────────────────────────────
  worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info -P solo --concurrency=1 -Q ingestion,extraction,celery
    gpus: all
    environment:
      DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@postgres:5432/ragdb
      CELERY_BROKER_URL: redis://:redispassword@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redispassword@redis:6379/1
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      DEV_MODE: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      LOCAL_LLM_BASE_URL: http://ollama:11434/v1
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.2:3b}
      JUDGE_LLM_BASE_URL: http://judge-ollama:11434
      JUDGE_MODEL: ${JUDGE_MODEL:-llama3.2:3b}
      JUDGE_ENABLED: "true"
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3:latest}
      EMBEDDING_DIMENSION: 1024
      OCR_LANG: ${OCR_LANG:-ar}
      OCR_DEVICE: ${OCR_DEVICE:-gpu}
      MOCK_LLM_RESPONSES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - rag-net

  # ── Celery evaluation worker ───────────────────────────────────────
  evaluation-worker:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info -P solo --concurrency=1 -Q evaluation
    environment:
      DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@postgres:5432/ragdb
      CELERY_BROKER_URL: redis://:redispassword@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:redispassword@redis:6379/1
      DEV_MODE: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      LOCAL_LLM_BASE_URL: http://ollama:11434/v1
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-llama3.2:3b}
      JUDGE_LLM_BASE_URL: http://judge-ollama:11434
      JUDGE_MODEL: ${JUDGE_MODEL:-llama3.2:3b}
      JUDGE_ENABLED: "true"
      JUDGE_SCORE_THRESHOLD: ${JUDGE_SCORE_THRESHOLD:-0.7}
      MOCK_LLM_RESPONSES: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      judge-ollama:
        condition: service_started
    networks:
      - rag-net

  # ── Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - rag-net

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  ollama_data:
    external: true
    name: rag-main-ollama
  judge_ollama_data:

networks:
  rag-net:
    driver: bridge
