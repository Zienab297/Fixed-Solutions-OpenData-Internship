# infrastructure/docker/prometheus/prometheus.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'rag-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'

  - job_name: 'celery-worker'
    static_configs:
      - targets: ['host.docker.internal:9101']
        labels:
          worker_service: rag-worker

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']