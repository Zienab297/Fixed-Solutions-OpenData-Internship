global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'rag-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'celery'
    static_configs:
      - targets: ['celery_worker:9090']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
