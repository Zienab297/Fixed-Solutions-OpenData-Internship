apiVersion: v2
name: rag-platform
description: Production-grade Helm chart for the Multi-User Multi-Domain RAG MVP
type: application
version: 1.0.0
appVersion: 1.0.0

dependencies:
  - name: postgresql
    version: "15.5.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "19.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: qdrant
    version: "1.17.0"
    repository: "https://qdrant.github.io/qdrant-helm"
    condition: qdrant.enabled
