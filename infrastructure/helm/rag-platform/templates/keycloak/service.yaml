{{- if .Values.keycloak.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-platform.fullname" . }}-keycloak
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: {{ .Values.keycloak.service.type }}
  ports:
    - port: {{ .Values.keycloak.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "rag-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
{{- end }}
