apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-platform.fullname" . }}-workers-metrics
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: workers-metrics
spec:
  clusterIP: None # Headless service for scraping endpoints directly
  ports:
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "rag-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/part-of: celery-worker
