apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rag-platform.fullname" . }}-secrets
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password .Release.Name .Values.postgresql.auth.database | b64enc | quote }}
  CELERY_BROKER_URL: {{ printf "redis://:%s@%s-redis-master:6379/0" .Values.redis.auth.password .Release.Name | b64enc | quote }}
  CELERY_RESULT_BACKEND: {{ printf "redis://:%s@%s-redis-master:6379/1" .Values.redis.auth.password .Release.Name | b64enc | quote }}
  
  AGE_PASSWORD: {{ .Values.age.auth.password | b64enc | quote }}
  
  SECRET_KEY: {{ .Values.api.secretKey | b64enc | quote }}
  ADMIN_PASSWORD: {{ .Values.api.adminPassword | b64enc | quote }}
  ADMIN_EMAIL: {{ .Values.api.adminEmail | b64enc | quote }}

  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.keycloak.auth.adminPassword | b64enc | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.keycloak.auth.clientSecret | b64enc | quote }}
