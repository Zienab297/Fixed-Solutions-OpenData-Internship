name: Sprint 1 CI

on:
  push:
    branches:
      - main
      - "sprint1/**"
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r backend/requirements-dev.txt

      - name: Compile backend package
        run: python -m compileall backend/app

      - name: Run tests
        run: python -m pytest

  compose:
    name: Docker Compose config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose -f infrastructure/docker/docker-compose.yml config
