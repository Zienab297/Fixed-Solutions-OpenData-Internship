<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG Sprint 1</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100vw - 32px));
        background: #ffffff;
        border: 1px solid #d9e1ee;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(30, 45, 70, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        line-height: 1.6;
        margin: 0 0 18px;
      }

      code {
        background: #eef3fb;
        border: 1px solid #d9e1ee;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RAG Sprint 1 Skeleton</h1>
      <p>
        This placeholder marks the frontend slot in the monorepo. The active
        Sprint 1 deliverables here are LLM routing, infrastructure, CI, and
        architecture diagrams.
      </p>
      <p>API health endpoint: <code>http://localhost:8000/health</code></p>
      <p>Query endpoint: <code>POST http://localhost:8000/api/v1/query</code></p>
    </main>
  </body>
</html>
